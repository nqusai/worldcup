<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Predictor</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f9; padding: 20px; max-width: 800px; margin: auto; color: #333; }
        h1 { text-align: center; color: #2c3e50; }
        .card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .match { display: flex; flex-direction: column; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px solid #e9ecef; }
        .match-header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .match-info { flex: 1; }
        .match-inputs { display: flex; align-items: center; gap: 10px; }
        
        input[type="number"] { width: 45px; padding: 8px; text-align: center; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
        input:disabled { background-color: #e9ecef; color: #6c757d; cursor: not-allowed; }
        
        button { background: #007aff; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; color: #666; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; font-weight: 600; }
        
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; background: #e3f2fd; color: #495057; margin-bottom: 5px; }
        .locked-badge { background: #dc3545; color: white; }
        
        .others-guesses { margin-top: 15px; padding: 10px; background: #e9ecef; border-radius: 6px; font-size: 13px; }
        .others-guesses ul { margin: 5px 0 0 0; padding-left: 20px; }
    </style>
</head>
<body>

    <h1>🏆 World Cup Predictor</h1>

    <!-- Player Account Section -->
    <div class="card" id="auth-section">
        <h3 style="margin-top: 0;">Player Account</h3>
        <p id="user-info">Please log in to play.</p>
        <button id="login-btn">Sign in with Google</button>
        <button id="logout-btn" style="display: none; background: #dc3545;">Log out</button>
    </div>

    <!-- Upcoming Matches Section -->
    <div class="card" id="predictions-section" style="display: none;">
        <h2 style="margin-top: 0; display: flex; justify-content: space-between; align-items: center;">
            Matches
            <button onclick="window.location.reload()" style="font-size: 12px; padding: 8px 15px;">Refresh</button>
        </h2>
        <p style="font-size: 13px; color: #666;">Predictions lock exactly 1 hour before kickoff. Once locked, everyone's guesses are revealed!</p>
        <div id="matches-container">Loading games...</div>
    </div>

    <!-- Leaderboard Section -->
    <div class="card" id="leaderboard-section">
        <h2 style="margin-top: 0;">Live Leaderboard</h2>
        <table>
            <thead><tr><th>Player</th><th>Points</th></tr></thead>
            <tbody id="leaderboard-body">
                <tr><td colspan="2" style="text-align: center; color: #666;">Waiting for data...</td></tr>
            </tbody>
        </table>
    </div>

    <footer style="text-align: center; font-size: 12px; color: #aaa; margin-top: 40px; padding-bottom: 20px;">
        <span id="version-number">v03 (Player Client)</span>
    </footer>

    <!-- Application Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyC9KFqUVsnOjTEX3dqZpgzh85kFALdGRYk",
            authDomain: "worldcup-210fb.firebaseapp.com",
            projectId: "worldcup-210fb",
            storageBucket: "worldcup-210fb.firebasestorage.app",
            messagingSenderId: "393380182317",
            appId: "1:393380182317:web:8db9333afe2fe04fd4bba4"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        // --- AUTHENTICATION ---
        document.getElementById("login-btn").addEventListener("click", () => signInWithPopup(auth, provider));
        document.getElementById("logout-btn").addEventListener("click", () => signOut(auth));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById("user-info").innerText = `Logged in as: ${user.displayName}`;
                document.getElementById("login-btn").style.display = "none";
                document.getElementById("logout-btn").style.display = "inline-block";
                document.getElementById("predictions-section").style.display = "block";
                
                loadPlayerDashboard();
            } else {
                currentUser = null;
                document.getElementById("user-info").innerText = "Please log in to play.";
                document.getElementById("login-btn").style.display = "inline-block";
                document.getElementById("logout-btn").style.display = "none";
                document.getElementById("predictions-section").style.display = "none";
                document.getElementById("matches-container").innerHTML = "";
            }
        });

        // --- PLAYER FUNCTIONS (Reads entirely from Firebase) ---
        async function loadPlayerDashboard() {
            const container = document.getElementById("matches-container");
            const lbBody = document.getElementById("leaderboard-body");
            
            try {
                // 1. Fetch Matches from Firebase (Admin puts them here)
                const matchesSnap = await getDocs(collection(db, "matches"));
                let matches = [];
                matchesSnap.forEach(doc => matches.push({id: doc.id, ...doc.data()}));
                
                // 2. Fetch all predictions from Firebase
                const predsSnap = await getDocs(collection(db, "predictions"));
                let allPreds = [];
                predsSnap.forEach(doc => allPreds.push(doc.data()));

                // 3. Fetch Leaderboard (Users collection)
                const usersSnap = await getDocs(collection(db, "users"));
                let users = [];
                usersSnap.forEach(doc => users.push(doc.data()));

                // Render Matches
                container.innerHTML = "";
                if(matches.length === 0) {
                    container.innerHTML = "<p>No matches loaded yet. Waiting for admin to sync.</p>";
                } else {
                    // Sort matches by date
                    matches.sort((a,b) => new Date(a.utcDate) - new Date(b.utcDate));
                    
                    matches.forEach(match => {
                        const matchDate = new Date(match.utcDate);
                        const msUntilKickoff = matchDate.getTime() - new Date().getTime();
                        const isLocked = msUntilKickoff <= 3600000; // 1 hour = 3600000 ms
                        
                        // Find user's own prediction
                        const myPred = allPreds.find(p => p.match_id === match.id && p.user_id === currentUser.uid);
                        const homeVal = myPred ? myPred.home_pred : "";
                        const awayVal = myPred ? myPred.away_pred : "";

                        let html = `
                            <div class="match">
                                <div class="match-header">
                                    <div class="match-info">
                                        <span class="status-badge ${isLocked ? 'locked-badge' : ''}">${isLocked ? '🔒 LOCKED' : match.status}</span><br>
                                        <strong>${match.homeTeam}</strong> vs <strong>${match.awayTeam}</strong><br>
                                        <small style="color: #666;">${matchDate.toLocaleString()}</small>
                                    </div>
                                    <div class="match-inputs">
                                        <input type="number" id="home-${match.id}" value="${homeVal}" min="0" ${isLocked ? 'disabled' : ''}>
                                        <span style="font-weight: bold;">-</span>
                                        <input type="number" id="away-${match.id}" value="${awayVal}" min="0" ${isLocked ? 'disabled' : ''}>
                                        <button id="btn-save-${match.id}" onclick="window.saveGuess('${match.id}')" ${isLocked ? 'disabled' : ''}>
                                            ${isLocked ? 'Locked' : (myPred ? 'Update' : 'Save')}
                                        </button>
                                        <span id="status-${match.id}" style="font-size: 12px; width: 50px;"></span>
                                    </div>
                                </div>
                        `;

                        // If locked, reveal everyone else's guesses!
                        if (isLocked) {
                            const matchPreds = allPreds.filter(p => p.match_id === match.id);
                            html += `<div class="others-guesses"><strong>Everyone's Guesses:</strong><ul>`;
                            if(matchPreds.length === 0) {
                                html += `<li>No one guessed on this game.</li>`;
                            } else {
                                matchPreds.forEach(p => {
                                    const pointString = p.points_awarded !== undefined ? ` <b style="color:green;">(+${p.points_awarded} pts)</b>` : "";
                                    html += `<li>${p.user_name}: <b>${p.home_pred} - ${p.away_pred}</b>${pointString}</li>`;
                                });
                            }
                            html += `</ul></div>`;
                        }

                        html += `</div>`;
                        container.innerHTML += html;
                    });
                }

                // Render Leaderboard
                lbBody.innerHTML = "";
                users.sort((a,b) => b.points - a.points); // Sort by points
                if(users.length === 0) {
                    lbBody.innerHTML = "<tr><td colspan='2' style='text-align: center;'>No players yet.</td></tr>";
                } else {
                    users.forEach((u, index) => {
                        let medal = index === 0 ? "🥇 " : index === 1 ? "🥈 " : index === 2 ? "🥉 " : "";
                        lbBody.innerHTML += `
                            <tr>
                                <td>${medal}${u.name}</td>
                                <td><b style="font-size: 1.1em; color: #007aff;">${u.points || 0}</b></td>
                            </tr>
                        `;
                    });
                }

            } catch (err) {
                console.error(err);
                container.innerHTML = `<p class="error">Error loading dashboard: ${err.message}</p>`;
            }
        }

        // Save Guess (Only works if not locked)
        window.saveGuess = async function(matchId) {
            const h = document.getElementById(`home-${matchId}`).value;
            const a = document.getElementById(`away-${matchId}`).value;
            const statusSpan = document.getElementById(`status-${matchId}`);
            
            if (h === "" || a === "") return alert("Enter both scores!");
            statusSpan.innerText = "Saving...";
            
            const predId = `${currentUser.uid}_${matchId}`;
            try {
                await setDoc(doc(db, "predictions", predId), {
                    user_id: currentUser.uid,
                    user_name: currentUser.displayName,
                    match_id: matchId,
                    home_pred: parseInt(h),
                    away_pred: parseInt(a)
                }, { merge: true });
                
                // Ensure user exists in leaderboard DB
                await setDoc(doc(db, "users", currentUser.uid), {
                    name: currentUser.displayName
                }, { merge: true });

                statusSpan.innerText = "✅ Saved";
                statusSpan.style.color = "green";
                setTimeout(() => statusSpan.innerText = "", 3000);
            } catch (err) {
                statusSpan.innerText = "❌ Error";
                alert(err.message);
            }
        };
    </script>
</body>
</html>
